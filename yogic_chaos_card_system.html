let current='all';

function makeCard(d,type){
  const T=TYPES[type];
  return `<div class="card ${T.cls}">
    <div class="card-inner">
      <div class="card-header"><span class="card-tag">${T.tag}</span></div>
      <div class="card-icon-zone">${T.icon}</div>
      <div class="card-divider" style="background:currentColor;opacity:.15"></div>
      <div style="height:8px"></div>
      <div class="card-title">${d.t}</div>
      <div style="height:5px"></div>
      <div class="card-effect">${d.e}</div>
      <div style="height:4px"></div>
      <div class="card-note">${d.n}</div>
    </div>
    <div class="card-footer">${T.foot}</div>
  </div>`;
}

function render(){
  const g=document.getElementById('grid');
  let html='',count=0;
  const types=current==='all'?['twist','herb','yoga','chaos']:[current];
  types.forEach(tp=>CARDS[tp].forEach(d=>{html+=makeCard(d,tp);count++;}));
  g.innerHTML=html;
  document.getElementById('info').textContent=`Showing ${count} cards — unified template, colour-coded by type`;
}

function filter(type,btn){
  current=type;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}
